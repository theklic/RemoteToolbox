name: CI

# Runs the test suite (including the docs-sync guards) on every push and PR, so
# code/doc drift can't merge silently. See tests/test_docs_sync.py.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install (dev only — optional extras stay unimported for mypy)
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (with dev + optional extras)
        run: pip install -e ".[dev,all]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest -q
